<header class="header">
    <div class="navigation">
        <a href="{{ '/' | prepend: site.baseurl }}" class="logo" style="display: inline-flex; align-items: center; gap: 0.4em;">
            <img src="/assets/img/raio.png" alt="RaioSmart Logo" style="height: 1.8em;">{{ site.title }}
        </a>
        <ul class="menu">
            <li class="menu__entry"><a href="{{ '/privacy-policy' | prepend: site.baseurl }}">Chính Sách Bảo Mật</a></li>
            <li class="menu__entry"><a href="{{ '/terms-of-service' | prepend: site.baseurl }}">Điều khoản sử dụng</a></li>
        </ul>
    </div>
    <ul class="social-links">
        {% if site.author.email %}
        <a href="mailto:{{ site.author.email }}" class="social-links__entry" target="_blank">
            <i class="fa fa-envelope-square"></i>
        </a>
        {% endif %}
        {% if site.author.github %}
        <a href="https://github.com/{{ site.author.github }}" class="social-links__entry" target="_blank">
            <i class="fa fa-github"></i>
        </a>
        {% endif %}
        {% if site.author.linkedin %}
        <a href="https://in.linkedin.com/in/{{ site.author.linkedin }}" class="social-links__entry" target="_blank">
            <i class="fa fa-linkedin"></i>
        </a>
        {% endif %}
        {% if site.author.website %}
        <a href="https://{{ site.author.website }}/" class="social-links__entry" target="_blank">
            <i class="fa fa-globe"></i>
        </a>
        {% endif %}
    </ul>
</header>
